name: Java CI

on:
  push:
    paths:
      - "java/**"
      - ".github/workflows/java-ci.yml"
  pull_request:
    paths:
      - "java/**"
      - ".github/workflows/java-ci.yml"

defaults:
  run:
    working-directory: java

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build + unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Build + unit tests
        run: mvn -B verify

      - name: Verify dicts JAR contains committed .bin files
        run: |
          jar tf coccoc-tokenizer-java-dicts/target/coccoc-tokenizer-java-dicts-1.0.0-SNAPSHOT.jar \
            | grep -E "\.bin$" | sort
          # Assert both structural tries are present
          jar tf coccoc-tokenizer-java-dicts/target/coccoc-tokenizer-java-dicts-1.0.0-SNAPSHOT.jar \
            | grep -q "com/coccoc/dicts/multiterm.bin"
          jar tf coccoc-tokenizer-java-dicts/target/coccoc-tokenizer-java-dicts-1.0.0-SNAPSHOT.jar \
            | grep -q "com/coccoc/dicts/syllable.bin"
          echo "Dict JAR contents verified."

      - name: Integration tests (Tokenizer.getInstance() classpath load)
        env:
          REQUIRE_DICTS: "1"
        run: |
          mvn -B -pl coccoc-tokenizer-java failsafe:integration-test failsafe:verify
